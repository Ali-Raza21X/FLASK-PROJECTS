{% extends 'layout.html' %}
{% block content %}

<form method="POST">
    {{ form.hidden_tag() }}

    {{ form.title.label }}
    {{ form.title(class="form-control") }}

    {{ form.content.label }}
    {{ form.content(class="form-control") }}

    {{ form.submit(class="btn btn-primary") }}
</form>

{% endblock %}
